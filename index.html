<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PvE Optimizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1c1917;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px;
    }

    .container { max-width: 1400px; width: 100%; }

    h1 {
      text-align: center;
      color: #f5f0e8;
      font-size: 1.6rem;
      margin-bottom: 24px;
    }

    .section {
      background: #292524;
      border: 1px solid #44403c;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #d6d3d1;
      margin-bottom: 14px;
    }

    p { color: #a8a29e; line-height: 1.5; }

    .label-lumber { color: #a67c52; }
    .label-clay { color: #c4703f; }
    .label-iron { color: #9a9ab0; }
    .label-crop { color: #b8a078; }
  </style>
</head>
<body>
  <div class="container">
    <h1>PvE Optimizer</h1>
    <div class="section">
      <div class="section-title">Oasis Farming — Travian (x3, T4.6)</div>
      <p>Optimize which oases to send troops on. Scaffold ready — build out the parser, calculation, and tabs here.</p>
    </div>
  </div>
</body>
</html>
