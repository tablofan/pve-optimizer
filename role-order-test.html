<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head><body>
<iframe id="f" src="index.html" style="width:1200px;height:2000px"></iframe>
<pre id="out"></pre>
<script>
const out = [];
function log(ok, name, extra) { out.push((ok ? 'REPRO-OK   ' : 'REPRO-BAD  ') + name + (extra ? ' — ' + extra : '')); }
const tick = ms => new Promise(r => setTimeout(r, ms));

const SIDEBAR = `
<div id="sidebarBoxVillageList">
  <div class="listEntry village" data-did="11"><span class="name">Alpha</span>
    <span class="coordinatesGrid"><span class="coordinateX">(0</span><span class="coordinateY">0)</span></span></div>
  <div class="listEntry village" data-did="12"><span class="name">Beta</span>
    <span class="coordinatesGrid"><span class="coordinateX">(5</span><span class="coordinateY">0)</span></span></div>
</div>`;

const FARMPAGE = `<html><body class="tribe7">` + SIDEBAR + `
<div class="villageWrapper"><div class="villageName">Alpha</div>
  <div class="farmListWrapper">
    <div class="farmListHeader"><span data-list="9"></span><span class="farmListName"><span class="name">L-A</span></span></div>
    <table><tbody>
      <tr class="slot"><td class="target"><a href="/karte.php?x=7&y=7">7|7</a></td>
        <td><i class="unit_small t6"></i><span class="value">10</span></td></tr>
    </tbody></table>
  </div></div>
</body></html>`;

const SIDEBARPAGE = `<html><body class="tribe7">` + SIDEBAR + `</body></html>`;

window.addEventListener('load', async () => {
  try {
    const f = document.getElementById('f');
    const W = f.contentWindow, D = f.contentDocument;
    W.localStorage.removeItem('pveData');
    // 1. oases first (documented order: Scan oases -> Send oases -> Send pages)
    W.postMessage({ pve: 'oases', oases: [{ x: 1, y: 1, bonuses: [{ res: 'crop', pct: 25 }] }], server: '', mapRadius: 200, scannedAt: '2026-01-01' }, '*');
    await tick(300);
    // 2. a page that has the village sidebar but NO farm lists (e.g. dorf1)
    W.postMessage({ pve: 'page', html: SIDEBARPAGE }, '*');
    await tick(300);
    const $ = id => D.getElementById(id);
    const roleOf = name => {
      const tr = Array.prototype.find.call($('vilTable').querySelectorAll('tr[data-did]'),
        r => r.cells[1].textContent === name);
      return tr && tr.querySelector('.vrole').value;
    };
    log(true, 'after sidebar-only page: Alpha role = ' + roleOf('Alpha'));
    const blob1 = JSON.parse(W.localStorage.getItem('pveData'));
    log(true, 'persisted perVillage after sidebar-only page: ' + JSON.stringify(blob1.config.perVillage));
    // 3. the farm-list page arrives (Alpha holds a PvP farm at 7|7 with comp t6:10)
    W.postMessage({ pve: 'page', html: FARMPAGE }, '*');
    await tick(300);
    log(true, 'after farm-list page: Alpha role = ' + roleOf('Alpha') + ' (contract: should derive pvp)');
    const blob2 = JSON.parse(W.localStorage.getItem('pveData'));
    log(true, 'persisted: ' + JSON.stringify(blob2.config.perVillage) + ' lists: ' + JSON.stringify(blob2.farmLists));

    // ── second scenario: legacy blob restore without oases (inc:false should defer, per contract) ──
    // seed a legacy blob: villages + farm lists with pvp-only farms, inc:false, maxTravelMin, NO oases
    const legacy = {
      server: '', tribe: 'huns', mapRadius: 200, scannedAt: '',
      villages: [{ did: 21, name: 'Deff', x: 0, y: 0, troops: { t6: 100 } }],
      oases: [],
      farmLists: [{ listId: 1, name: 'L', villageName: 'Deff', villageDid: 21, targets: [{ x: 9, y: 9 }] }],
      pendingTroops: { byDid: {}, byName: {} }, skipped: [],
      config: { intervalSec: 300, maxTravelMin: 30, diffFilters: { add: true, move: true, keep: true, remove: true }, perVillage: { 21: { inc: false, ts: 5 } } }
    };
    W.localStorage.setItem('pveData', JSON.stringify(legacy));
    f.src = 'index.html'; // reload calculator -> restore()
    await new Promise(r => { f.onload = r; });
    await tick(400);
    const W2 = f.contentWindow, D2 = f.contentDocument;
    const blob3 = JSON.parse(W2.localStorage.getItem('pveData'));
    log(true, 'legacy restore (no oases): perVillage = ' + JSON.stringify(blob3.config.perVillage)
      + ' maxTravelMin=' + JSON.stringify(blob3.config.maxTravelMin));
    // now oases arrive — village holds only pvp farms; contract says inc:false -> pvp
    W2.postMessage({ pve: 'oases', oases: [{ x: 1, y: 1, bonuses: [{ res: 'crop', pct: 25 }] }], server: '', mapRadius: 200, scannedAt: '2026-01-01' }, '*');
    await tick(300);
    const blob4 = JSON.parse(W2.localStorage.getItem('pveData'));
    log(true, 'after oases arrive: perVillage = ' + JSON.stringify(blob4.config.perVillage) + ' (contract: pvp)');
  } catch (e) {
    log(false, 'EXCEPTION', e && (e.message + ' @ ' + (e.stack || '').split('\n')[1]));
  }
  document.getElementById('out').textContent = out.join('\n');
  document.title = 'REPRO-DONE';
});
</script></body></html>
